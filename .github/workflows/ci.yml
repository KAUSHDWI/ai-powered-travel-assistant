name: CI Pipeline

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  # ─── Backend Job ────────────────────────────────────────────────────────────
  server-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install Dependencies
        run: |
          cd server
          npm ci

      - name: Audit Dependencies
        run: |
          cd server
          npm audit --audit-level=high || true

      - name: Lint Check
        run: |
          cd server
          npm run lint || true # optional eslint warning check

      - name: Typecheck Strict compilation
        run: |
          cd server
          npm run typecheck

      - name: Execute Tests
        run: |
          cd server
          npm test

  # ─── Frontend Job ───────────────────────────────────────────────────────────
  client-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Dependencies
        run: |
          cd client
          npm ci

      - name: Lint Check
        run: |
          cd client
          npm run lint || true

      - name: Typecheck compilation
        run: |
          cd client
          npm run typecheck

      - name: Execute Tests
        run: |
          cd client
          npm test
